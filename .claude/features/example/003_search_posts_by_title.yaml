# Feature Specification
# Status: Implemented
# Last Updated: 2026-06-30

meta:
  id: FEAT-003
  title: 게시글 제목 검색
  type: Feature
  author: 1winhyun

overview:
  summary: >
    게시글 제목으로 게시글을 검색하는 기능.
    FEAT-002(전체 조회)의 Read 흐름을 검색(조건 조회)으로 확장.
  user_story: >
    As a 팀원, I want to 제목 키워드로 게시글을 검색하고,
    so that 원하는 게시글을 빠르게 찾을 수 있다.
  goals:
    - 제목 접두어 일치(StartingWith) 검색 흐름(Controller → UseCase → DomainService → Repository) 예시 제공
    - 삭제된 게시글 제외 검색 (Soft Delete 적용)
    - 대소문자 구분 없는 검색 제공

technical_spec:
  api:
    - method: GET
      path: /api/v1/posts/search
      summary: 제목으로 게시글 검색
      auth: None (예시용 - 인증 불필요)
      request:
        dto: None (@RequestParam 사용)
        params:
          - name: title
            in: query
            type: String
            required: true
            validation: "@NotBlank, @Size(max = 100)"
            description: "검색할 제목 키워드 (접두어 일치 - 해당 키워드로 시작하는 제목)"
      response:
        dto: PostResponse
        http_status: 200 OK
        response_code: PostResponseCode.POSTS_SEARCHED
        wrapper: CommonResponse<List<PostResponse>>
        fields:
          - name: id
            type: Long
          - name: title
            type: String
          - name: content
            type: String
          - name: authorName
            type: String
          - name: createdAt
            type: LocalDateTime

  data_flow:
    - step: 1
      layer: Presentation (PostController)
      action: "@Valid로 title 검증 후 PostUseCase.searchPostsByTitle(title) 호출"
    - step: 2
      layer: UseCase (PostUseCase.searchPostsByTitle)
      action: "PostGetService 호출 → List<PostResponse> 반환 (PostResponse.from 변환)"
      transaction: false (readOnly = true)
    - step: 3
      layer: Domain (PostGetService.searchByTitle)
      action: "PostRepository.findByTitleStartingWithIgnoreCaseAndDeletedFalse(title) 호출"
    - step: 4
      layer: Infrastructure (PostRepository)
      action: "title LIKE '키워드%' AND deleted = false 조건으로 조회"

  database:
    entities:
      - name: Post
        action: Read
        table: posts
        notes: "title 접두어 일치(LIKE '키워드%') + deleted = false 조건 필수 (Soft Delete)"

  validation_rules:
    - "title: 비어 있으면 안 됨(@NotBlank), 최대 100자(@Size)"
    - "검색은 제목 접두어 일치(StartingWith - 키워드로 시작), 대소문자 구분 없음(IgnoreCase)"
    - "삭제된 게시글(deleted = true)은 결과에서 제외"

package_structure:
  base: "com.coding.test.domain.example"
  domain:
    - "domain/example/domain/repository/PostRepository.java (findByTitleStartingWithIgnoreCaseAndDeletedFalse 추가)"
    - "domain/example/domain/service/PostGetService.java (searchByTitle 추가)"
  application:
    - "domain/example/application/usecase/PostUseCase.java (searchPostsByTitle 추가 — Single Facade per domain)"
  presentation:
    - "domain/example/presentation/PostController.java (GET /search 엔드포인트 추가)"
    - "domain/example/presentation/response/PostResponseCode.java (POSTS_SEARCHED 추가)"

testing_strategy:
  happy_path:
    - "키워드로 시작하는 제목의 게시글들이 반환된다"
    - "대소문자가 달라도 검색된다 (IgnoreCase)"
  edge_cases:
    - "키워드가 제목 중간/끝에만 포함된 게시글은 검색되지 않는다 (접두어 일치)"
    - "일치하는 게시글이 없으면 빈 리스트가 반환된다"
    - "삭제된 게시글은 검색 결과에 포함되지 않는다"
    - "title이 blank이면 위반이 발생한다 (@NotBlank)"

notes:
  - "이 기능은 예시용입니다. 실제 인증/권한 처리는 포함하지 않습니다."
  - "검색은 '접두어 일치(StartingWith) + 대소문자 무시'로 설계함 (키워드로 시작하는 제목만 매칭)."
  - "PostResponse.from(post) Static Factory Method 패턴을 반드시 준수합니다."
  - "UseCase는 PostUseCase 단일 Facade이며, Repository 직접 의존 금지 → PostGetService(Domain Service)를 경유합니다."
